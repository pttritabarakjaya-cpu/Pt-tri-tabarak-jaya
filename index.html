<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>PT Tri Tabarak Jaya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial; text-align:center; padding:30px; }
    h1 { color:#00ff88; }
    .box { background:#1a1a1a; padding:20px; border-radius:12px; max-width:400px; margin:auto; }
    input, button { width:90%; padding:12px; margin:10px 0; border-radius:8px; border:none; }
    button { background:#00ff88; color:black; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>
  <h1>PT Tri Tabarak Jaya</h1>
  <p>Website sudah online ✅</p>
  
  <div class="box">
    <h2>Bayar DP Sekarang</h2>
    <input type="text" id="nama" placeholder="Nama Anda">
    <input type="number" id="nominal" placeholder="Nominal DP">
    <button onclick="kirimWA()">Bayar via WA Admin</button>
  </div>

<script>
function kirimWA() {
  let nama = document.getElementById('nama').value;
  let nominal = document.getElementById('nominal').value;
  let pesan = `Halo Admin PT Tri Tabarak Jaya%0A%0ANama: ${nama}%0ANominal DP: Rp ${nominal}`;
  let noWA = "6285105371373"; // GANTI INI PAKE NO KAMU
  window.open(`https://wa.me/${noWA}?text=${pesan}`, '_blank');
}
</script>
</body>
    </html>
